<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>{{ title }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: #0a0a0b;
  color: #e4e4e7;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.65;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing: antialiased;
  overflow-wrap: break-word;
}
article {
  max-width: 44rem;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 4rem;
}
article > :first-child { margin-top: 0; }

/* ---- Headings ---- */
h1, h2, h3, h4, h5, h6 {
  line-height: 1.25;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: #f4f4f5;
  margin-top: 2rem;
  margin-bottom: 0.75rem;
}
h1 { font-size: 1.875rem; margin-top: 0; padding-bottom: 0.5rem; border-bottom: 1px solid #27272a; }
h2 { font-size: 1.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid #27272a; }
h3 { font-size: 1.25rem; }
h4 { font-size: 1.1rem; }
h5, h6 { font-size: 1rem; color: #d4d4d8; }

/* ---- Paragraphs, lists, quotes ---- */
p, ul, ol, blockquote, table, pre { margin: 0 0 1rem; }
ul, ol { padding-left: 1.5rem; }
li { margin-bottom: 0.25rem; }
li > ul, li > ol { margin-top: 0.25rem; margin-bottom: 0.25rem; }
blockquote {
  margin: 0 0 1rem;
  padding: 0.5rem 1rem;
  color: #a1a1aa;
  border-left: 3px solid #3f3f46;
  background: #111113;
  border-radius: 0 6px 6px 0;
}
blockquote p:last-child { margin-bottom: 0; }
hr { border: 0; border-top: 1px solid #27272a; margin: 2rem 0; }

/* ---- Inline elements ---- */
a {
  color: #60a5fa;
  text-decoration: none;
  word-break: break-word;
}
a:hover, a:active { text-decoration: underline; }
strong { color: #f4f4f5; font-weight: 600; }
em { color: #d4d4d8; }
mark { background: #4a3e04; color: #fde68a; padding: 1px 4px; border-radius: 3px; }
del { color: #71717a; }

/* ---- Code ---- */
code, pre, kbd, samp {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.9em;
}
code {
  background: #1a1a1d;
  color: #f0abfc;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid #27272a;
}
pre {
  background: #111113;
  border: 1px solid #27272a;
  border-radius: 8px;
  padding: 1rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
pre code {
  background: transparent;
  border: none;
  padding: 0;
  color: #e4e4e7;
  font-size: 0.88em;
  line-height: 1.55;
}
kbd {
  background: #27272a;
  border: 1px solid #3f3f46;
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 0.85em;
  color: #e4e4e7;
}

/* ---- Images / media ---- */
img, video {
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  background: #1a1a1d;
}

/* ---- Tables ---- */
table {
  border-collapse: collapse;
  width: 100%;
  display: block;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
th, td {
  padding: 0.5rem 0.75rem;
  border: 1px solid #27272a;
  text-align: left;
  vertical-align: top;
}
th { background: #18181b; font-weight: 600; color: #f4f4f5; }
tr:nth-child(even) td { background: #0f0f10; }

/* ---- Task lists (GFM-style checkboxes rendered by Python-Markdown's sane_lists) ---- */
input[type="checkbox"] { margin-right: 0.4rem; transform: translateY(1px); }

/* ---- Footer ---- */
footer {
  max-width: 44rem;
  margin: 0 auto;
  padding: 1rem 1.25rem 2rem;
  border-top: 1px solid #27272a;
  font-size: 0.8rem;
  color: #71717a;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
footer a {
  color: #71717a;
  text-decoration: none;
  padding: 0.35rem 0.75rem;
  border-radius: 999px;
  background: #18181b;
  border: 1px solid #27272a;
}
footer a:hover { color: #e4e4e7; border-color: #3f3f46; text-decoration: none; }
</style>
</head>
<body>
<article>
{{ body|safe }}
</article>
<footer>
  <span>{{ title }}.md</span>
  <a href="?raw=1">view source</a>
</footer>
</body>
</html>
